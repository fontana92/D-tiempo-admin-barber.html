<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TIEMPO | Panel de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        h1 { color: #c9a86a; border-bottom: 2px solid #c9a86a; padding-bottom: 10px; }
        .client-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .client-info h3 { margin: 0; font-size: 1.2rem; }
        .client-info p { margin: 5px 0 0; color: #888; font-size: 0.9rem; }
        button { background: #c9a86a; color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        button:hover { background: #fff; }
        .empty { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>D-TIEMPO: Panel de Control</h1>
    <div id="list">
        <p class="empty">Cargando fila en tiempo real...</p>
    </div>

    <script>
    // 1. Configuración (Usa los mismos datos que en el cliente)
    const SUPABASE_URL = "https://rbxfnjvavvlttqansdvh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieGZuanZhdnZsdHRxYW5zZHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE2NTMsImV4cCI6MjA4ODgxNzY1M30.a-XFDFCPu3vpQGx_xfIHYdurNPJNVkNZylrzaIcHv84"; // PEGÁ TU KEY COMPLETA
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Función para cargar la lista de gente esperando
    async function loadQueue() {
        console.log("Cargando lista de clientes...");
        
        const { data, error } = await supabaseClient
            .from('fila_virtual')
            .select('*')
            .eq('estado', 'esperando') // Solo los que están en la fila
            .order('created_at', { ascending: true });

        if (error) {
            console.error("Error al cargar lista:", error.message);
            return;
        }

        const listDiv = document.getElementById('list');
        
        if (!data || data.length === 0) {
            listDiv.innerHTML = '<p class="empty">No hay nadie en la fila por ahora.</p>';
            return;
        }

        // Renderizar la lista
        listDiv.innerHTML = data.map((cliente, index) => `
            <div class="client-card">
                <div class="client-info">
                    <h3>${cliente.nombre_cliente}</h3>
                    <p>Posición: #${index + 1} | ID: ${cliente.id}</p>
                </div>
                <button onclick="atenderCliente('${cliente.id}', '${cliente.nombre_cliente}')">
                    ${index === 0 ? '🔔 LLAMAR SIGUIENTE' : 'LLAMAR'}
                </button>
            </div>
        `).join('');
    }

    // 3. Función para llamar/atender al cliente (lo saca de la fila)
    async function atenderCliente(id, nombre) {
        console.log("Atendiendo a:", nombre);
        
        const { error } = await supabaseClient
            .from('fila_virtual')
            .update({ estado: 'atendido' }) // Cambiamos el estado
            .eq('id', id);

        if (error) {
            alert("Error al atender: " + error.message);
        } else {
            console.log(nombre + " atendido con éxito.");
            // No hace falta recargar, el tiempo real lo hará solo
        }
    }

    // 4. TIEMPO REAL: Escuchar cuando alguien se anota o cuando alguien sale
    supabaseClient
        .channel('admin_realtime')
        // Buscá esta parte en tu código del admin y agregá la línea del sonido
.on('postgres_changes', { event: 'INSERT', table: 'fila_virtual' }, (payload) => {
    console.log("¡Nuevo cliente en la fila!");
    
    // Reproducir un sonido de notificación
    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    audio.play();

    // Carga inicial
    loadQueue();
</script>
</body>
</html>
